<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Griette App Updater</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #2e1a0e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #f7f1e8;
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 300;
      color: #2e1a0e;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 12px;
      color: #9b7c5a;
      margin-bottom: 32px;
      font-family: 'Arial', sans-serif;
    }
    .step {
      background: white;
      border: 1.5px solid #e0d5c5;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      text-align: left;
    }
    .step-num {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9b6240;
      margin-bottom: 6px;
      font-family: 'Arial', sans-serif;
    }
    .step-title {
      font-size: 14px;
      color: #2e1a0e;
      font-family: 'Arial', sans-serif;
    }
    .file-label {
      display: block;
      width: 100%;
      padding: 14px;
      background: white;
      border: 2px dashed #c9a87a;
      border-radius: 12px;
      font-size: 13px;
      color: #9b7c5a;
      cursor: pointer;
      margin: 20px 0 12px;
      font-family: 'Arial', sans-serif;
      transition: all 0.2s;
    }
    .file-label:hover { border-color: #9b6240; color: #9b6240; }
    .file-label.selected { border-color: #9b6240; color: #2e1a0e; background: rgba(155,98,64,0.06); }
    #file-input { display: none; }
    .publish-btn {
      width: 100%;
      padding: 16px;
      background: #2e1a0e;
      color: #f7f1e8;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    .publish-btn:disabled { opacity: 0.5; cursor: default; }
    .publish-btn:hover:not(:disabled) { opacity: 0.85; }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 12px;
      font-family: 'Arial', sans-serif;
      display: none;
    }
    .status.success { background: rgba(74,138,92,0.12); color: #2d6e44; border: 1.5px solid rgba(74,138,92,0.3); }
    .status.error { background: rgba(181,35,42,0.08); color: #b5232a; border: 1.5px solid rgba(181,35,42,0.2); }
    .status.loading { background: rgba(155,98,64,0.08); color: #9b6240; border: 1.5px solid rgba(155,98,64,0.2); }
    .divider { border: none; border-top: 1px solid #e0d5c5; margin: 20px 0; }
    .tip { font-size: 10px; color: #b0a090; font-family: 'Arial', sans-serif; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Griette Updater</h1>
    <p class="sub">Nieuwe app-versie publiceren</p>

    <div class="step">
      <div class="step-num">Stap 1</div>
      <div class="step-title">Download de nieuwe versie van Claude</div>
    </div>
    <div class="step">
      <div class="step-num">Stap 2</div>
      <div class="step-title">Selecteer het bestand hieronder</div>
    </div>
    <div class="step">
      <div class="step-num">Stap 3</div>
      <div class="step-title">Tik op Publiceer — klaar!</div>
    </div>

    <hr class="divider">

    <label class="file-label" id="file-label" for="file-input">
      📁 Kies griette_stylist_FIXED.html
    </label>
    <input type="file" id="file-input" accept=".html">

    <button class="publish-btn" id="publish-btn" disabled>
      🚀 Publiceer naar GitHub
    </button>

    <div class="status" id="status"></div>

    <hr class="divider">
    <p class="tip">
      Na publiceren is de app binnen 1-2 minuten live op GitHub Pages.<br>
      Voeg deze pagina toe aan je thuisscherm voor snelle toegang.
    </p>
  </div>

  <script>
    var selectedFile = null;
    var WORKER_URL = 'https://griette-stylist.griette.workers.dev/publish';

    document.getElementById('file-input').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      selectedFile = file;
      var label = document.getElementById('file-label');
      label.textContent = '✓ ' + file.name + ' (' + Math.round(file.size / 1024) + ' KB)';
      label.classList.add('selected');
      document.getElementById('publish-btn').disabled = false;
    });

    document.getElementById('publish-btn').addEventListener('click', async function() {
      if (!selectedFile) return;

      var btn = document.getElementById('publish-btn');
      var status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = 'Bezig...';
      status.className = 'status loading';
      status.style.display = 'block';
      status.textContent = '📤 Bestand lezen en uploaden naar GitHub...';

      try {
        var content = await readFile(selectedFile);

        var response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: content })
        });

        var data = await response.json();

        if (data.success) {
          status.className = 'status success';
          status.textContent = '✦ Gepubliceerd! App is binnen 1-2 minuten live.';
          btn.textContent = '✓ Gepubliceerd';
        } else {
          throw new Error(data.error || 'Onbekende fout');
        }
      } catch(err) {
        status.className = 'status error';
        status.textContent = '⚠ Fout: ' + err.message;
        btn.disabled = false;
        btn.textContent = '🚀 Publiceer naar GitHub';
      }
    });

    function readFile(file) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) { resolve(e.target.result); };
        reader.onerror = reject;
        reader.readAsText(file, 'UTF-8');
      });
    }
  </script>
</body>
</html>
