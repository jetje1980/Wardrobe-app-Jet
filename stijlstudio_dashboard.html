<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stijl Studio — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--cr:#FDFAF6;--cr2:#F0E8DC;--ink:#1C1612;--ink2:#5A4A3A;--t:#C4714A;--t2:#A85A38;--tl:#F0D4C0;--s:#D4C4B0;--wh:#fff;--fd:'Cormorant Garamond',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:#1C1612;color:var(--ink);min-height:100vh}
/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
.login-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:36px 28px;max-width:340px;width:100%;text-align:center}
.login-logo{font-family:var(--fd);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--tl);margin-bottom:24px;opacity:.8}
.login-title{font-family:var(--fd);font-size:32px;font-style:italic;font-weight:300;color:white;margin-bottom:8px}
.login-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:28px}
.login-in{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:13px 16px;font-family:var(--fb);font-size:14px;color:white;outline:none;transition:all .2s;margin-bottom:12px}
.login-in:focus{border-color:var(--t)}
.login-btn{width:100%;height:46px;border-radius:100px;background:var(--t);color:white;border:none;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.login-btn:active{background:var(--t2)}.login-btn:disabled{background:rgba(255,255,255,.1);cursor:not-allowed}
.login-err{font-size:12px;color:#E88080;margin-top:10px}
/* DASHBOARD */
#dash{display:none;min-height:100vh;background:var(--cr)}
.dash-header{background:linear-gradient(135deg,#1C1612,#2A1E14);padding:24px 28px;display:flex;align-items:center;justify-content:space-between}
.dash-logo{font-family:var(--fd);font-size:22px;font-style:italic;font-weight:300;color:white}
.dash-logo span{color:var(--tl)}
.dash-meta{font-size:12px;color:rgba(255,255,255,.4)}
.dash-body{padding:24px 28px;max-width:1200px;margin:0 auto}
/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--wh);border-radius:14px;padding:18px;box-shadow:0 2px 12px rgba(28,22,18,.08);text-align:center}
.stat-n{font-family:var(--fd);font-size:36px;font-weight:400;color:var(--ink)}
.stat-l{font-size:11px;color:var(--ink2);font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.stat-t{font-size:11px;color:var(--t);font-weight:500;margin-top:3px}
/* Users */
.section{margin-bottom:28px}
.section-title{font-family:var(--fd);font-size:22px;font-weight:400;color:var(--ink);margin-bottom:14px}
.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.user-card{background:var(--wh);border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(28,22,18,.08)}
.user-code{font-size:11px;letter-spacing:.12em;font-weight:600;color:var(--t);margin-bottom:4px}
.user-name{font-family:var(--fd);font-size:18px;font-weight:400;color:var(--ink);margin-bottom:8px}
.user-arch{display:inline-block;padding:3px 10px;border-radius:100px;background:var(--cr2);font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:8px}
.user-stats{display:flex;gap:12px;flex-wrap:wrap}
.user-stat{font-size:11px;color:var(--ink2)}
.user-stat strong{color:var(--ink);font-weight:600}
.user-seen{font-size:10px;color:var(--s);margin-top:6px}
.user-online{width:8px;height:8px;border-radius:50%;background:#4A9E6A;display:inline-block;margin-right:4px}
/* Feedback */
.feedback-list{display:flex;flex-direction:column;gap:12px}
.fb-card{background:var(--wh);border-radius:14px;padding:16px;box-shadow:0 2px 12px rgba(28,22,18,.08);border-left:4px solid var(--t)}
.fb-card.bug{border-left-color:#C44A4A}
.fb-card.idee{border-left-color:#4A7A5E}
.fb-card.mis_ik{border-left-color:#8B5E83}
.fb-card.algemeen{border-left-color:var(--t)}
.fb-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.fb-user{font-size:12px;font-weight:600;color:var(--ink)}
.fb-type-badge{padding:3px 9px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.fb-type-badge.algemeen{background:var(--tl);color:var(--t2)}
.fb-type-badge.bug{background:#FEE4E4;color:#C44A4A}
.fb-type-badge.idee{background:#E0F0E8;color:#2A6B4A}
.fb-type-badge.mis_ik{background:#F0E0F4;color:#6B2A8B}
.fb-stars{color:gold;font-size:13px}
.fb-screen{font-size:11px;color:var(--s);margin-left:auto}
.fb-msg{font-size:14px;color:var(--ink);line-height:1.65}
.fb-date{font-size:11px;color:var(--s);margin-top:8px}
/* Events */
.event-list{display:flex;flex-direction:column;gap:7px}
.event-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--wh);border-radius:10px;font-size:13px}
.event-user{font-weight:600;color:var(--t);min-width:80px}
.event-name{color:var(--ink)}
.event-time{margin-left:auto;font-size:11px;color:var(--s)}
/* Filters */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border-radius:100px;border:1.5px solid var(--s);background:var(--wh);font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .2s;font-family:var(--fb)}
.filter-btn.on{background:var(--ink);border-color:var(--ink);color:white}
.refresh-btn{padding:7px 14px;border-radius:100px;background:var(--t);border:none;color:white;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fb);margin-left:auto}
.empty-state{text-align:center;padding:32px;color:var(--ink2);font-style:italic;font-family:var(--fd);font-size:18px}
.loading{text-align:center;padding:24px;color:var(--ink2)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--s);border-top-color:var(--t);border-radius:50%;animation:sp .75s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">Stijl Studio</div>
    <div class="login-title">Dashboard</div>
    <div class="login-sub">Alleen voor Griette</div>
    <input class="login-in" id="pwIn" type="password" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Inloggen</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="dash-header">
    <div class="dash-logo">Stijl <span>Studio</span> Dashboard</div>
    <div class="dash-meta" id="dashMeta">Laden...</div>
  </div>
  <div class="dash-body">

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-n" id="sUsers">-</div><div class="stat-l">Gebruikers</div><div class="stat-t">actieve beta</div></div>
      <div class="stat-card"><div class="stat-n" id="sFeedback">-</div><div class="stat-l">Feedbacks</div><div class="stat-t">totaal ontvangen</div></div>
      <div class="stat-card"><div class="stat-n" id="sEvents">-</div><div class="stat-l">Events</div><div class="stat-t">deze week</div></div>
      <div class="stat-card"><div class="stat-n" id="sItems">-</div><div class="stat-l">Items</div><div class="stat-t">in garderobe totaal</div></div>
    </div>

    <!-- Users -->
    <div class="section">
      <div class="section-title">Beta gebruikers</div>
      <div class="users-grid" id="usersGrid"><div class="loading"><span class="spin"></span>Laden...</div></div>
    </div>

    <!-- Feedback -->
    <div class="section">
      <div class="section-title">Feedback</div>
      <div class="filter-row">
        <button class="filter-btn on" data-f="all" onclick="filterFb(this,'all')">Alles</button>
        <button class="filter-btn" data-f="algemeen" onclick="filterFb(this,'algemeen')">💭 Algemeen</button>
        <button class="filter-btn" data-f="mis_ik" onclick="filterFb(this,'mis_ik')">🔍 Dit mis ik</button>
        <button class="filter-btn" data-f="idee" onclick="filterFb(this,'idee')">💡 Idee</button>
        <button class="filter-btn" data-f="bug" onclick="filterFb(this,'bug')">🐛 Bug</button>
        <button class="refresh-btn" onclick="loadAll()">↻ Vernieuwen</button>
      </div>
      <div class="feedback-list" id="feedbackList"><div class="loading"><span class="spin"></span>Laden...</div></div>
    </div>

    <!-- Recent events -->
    <div class="section">
      <div class="section-title">Recente activiteit</div>
      <div class="event-list" id="eventList"><div class="loading"><span class="spin"></span>Laden...</div></div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://osuqtfsxmquwqsbgzlqn.supabase.co';
const SUPABASE_ANON = 'sb_publishable_6T-JJKX10RgLkWGwBwYaxg_gFANhdHS';
// Dashboard password — verander dit!
const DASH_PASSWORD = 'stijlstudio2025';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let allFeedback = [];
let currentFilter = 'all';

function doLogin() {
  const pw = document.getElementById('pwIn').value;
  if (pw === DASH_PASSWORD) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadAll();
    // Auto-refresh every 2 minutes
    setInterval(loadAll, 120000);
  } else {
    document.getElementById('loginErr').textContent = 'Onjuist wachtwoord';
  }
}

async function loadAll() {
  document.getElementById('dashMeta').textContent = 'Bijgewerkt: ' + new Date().toLocaleTimeString('nl-NL');
  await Promise.all([loadUsers(), loadFeedback(), loadEvents()]);
}

async function loadUsers() {
  const { data: users } = await sb.from('users').select('*').order('last_seen', {ascending:false});
  const { data: codes } = await sb.from('beta_codes').select('*');
  if (!codes) return;

  const userMap = {};
  (users||[]).forEach(u => { userMap[u.code] = u; });

  const now = Date.now();
  let totalItems = 0;
  let activeCount = 0;

  document.getElementById('usersGrid').innerHTML = codes.map(c => {
    const u = userMap[c.code];
    const dna = u?.style_dna;
    const items = u?.items || {};
    const itemCount = Object.values(items).flat().length;
    totalItems += itemCount;

    const lastSeen = u?.last_seen ? new Date(u.last_seen) : null;
    const minutesAgo = lastSeen ? Math.floor((now - lastSeen.getTime()) / 60000) : null;
    const isRecent = minutesAgo !== null && minutesAgo < 30;
    if (u) activeCount++;

    const archs = dna?.archetypes || [];
    const archStr = archs.map(k => {const a={klassiek:'Klassiek',createur:'Créateur',naturel:'Naturel',romantisch:'Romantisch',stoer:'Stoer',modern:'Modern'};return a[k]||k;}).join(' × ');

    return `<div class="user-card">
      <div class="user-code">${c.code} ${c.active?'<span style="color:#4A9E6A">●</span>':'<span style="color:#C44A4A">●</span>'}</div>
      <div class="user-name">${isRecent?'<span class="user-online"></span>':''}${u?.naam || c.naam || '—'}</div>
      ${archStr?`<div class="user-arch">${archStr}</div>`:'<div style="font-size:11px;color:var(--s);margin-bottom:8px">Quiz nog niet gedaan</div>'}
      <div class="user-stats">
        <div class="user-stat"><strong>${itemCount}</strong> items</div>
        ${dna?.uitdagingen?`<div class="user-stat"><strong>${dna.uitdagingen.length}</strong> uitdagingen</div>`:''}
        ${dna?.kleuren?`<div class="user-stat"><strong>${dna.kleuren.length}</strong> kleuren</div>`:''}
      </div>
      <div class="user-seen">${lastSeen?`Laatste activiteit: ${lastSeen.toLocaleDateString('nl-NL')} ${lastSeen.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`:'Nog niet ingelogd'}</div>
    </div>`;
  }).join('');

  document.getElementById('sUsers').textContent = activeCount;
  document.getElementById('sItems').textContent = totalItems;
}

async function loadFeedback() {
  const { data } = await sb.from('feedback').select('*').order('created_at', {ascending:false}).limit(100);
  allFeedback = data || [];
  document.getElementById('sFeedback').textContent = allFeedback.length;
  renderFeedback();
}

function renderFeedback() {
  const list = currentFilter === 'all' ? allFeedback : allFeedback.filter(f => f.type === currentFilter);
  if (!list.length) {
    document.getElementById('feedbackList').innerHTML = '<div class="empty-state">Nog geen feedback ontvangen</div>';
    return;
  }
  document.getElementById('feedbackList').innerHTML = list.map(f => {
    const stars = f.rating ? '⭐'.repeat(f.rating) : '';
    const date = new Date(f.created_at).toLocaleDateString('nl-NL', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const typeLabels = {algemeen:'💭 Algemeen',bug:'🐛 Bug',idee:'💡 Idee',mis_ik:'🔍 Dit mis ik'};
    return `<div class="fb-card ${f.type||'algemeen'}">
      <div class="fb-header">
        <div class="fb-user">${f.user_naam||f.user_code||'?'}</div>
        <div class="fb-type-badge ${f.type||'algemeen'}">${typeLabels[f.type]||f.type}</div>
        ${stars?`<div class="fb-stars">${stars}</div>`:''}
        ${f.scherm?`<div class="fb-screen">${f.scherm}</div>`:''}
      </div>
      <div class="fb-msg">${f.bericht}</div>
      <div class="fb-date">${date}</div>
    </div>`;
  }).join('');
}

function filterFb(el, type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  currentFilter = type;
  renderFeedback();
}

async function loadEvents() {
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString();
  const { data } = await sb.from('sessions').select('*').gte('created_at', weekAgo).order('created_at', {ascending:false}).limit(50);
  const events = data || [];
  document.getElementById('sEvents').textContent = events.length;

  const eventLabels = {gate_enter:'✦ Ingelogd',quiz_complete:'🧬 Quiz afgerond',app_open:'👗 App geopend',outfit_generated:'✨ Outfit gegenereerd',outfit_worn:'❖ Outfit gedragen',item_added:'+ Item toegevoegd',chat_sent:'💬 Stylist gevraagd',inspo_scan:'🔍 Inspo scan',demo_loaded:'📦 Demo geladen',tab_view:'👁 Tab bekeken'};

  document.getElementById('eventList').innerHTML = events.slice(0,20).map(e => {
    const date = new Date(e.created_at).toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit'});
    const dateStr = new Date(e.created_at).toLocaleDateString('nl-NL', {day:'numeric',month:'short'});
    return `<div class="event-row">
      <div class="event-user">${e.user_code||'?'}</div>
      <div class="event-name">${eventLabels[e.event]||e.event}</div>
      <div class="event-time">${dateStr} ${date}</div>
    </div>`;
  }).join('') || '<div class="empty-state">Nog geen activiteit</div>';
}

document.getElementById('pwIn').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
